spring.main.banner-mode=off
spring.datasource.url=jdbc:h2:mem:unittest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
app.jwt.secret=test-jwt-secret-must-be-at-least-32-chars!!

# Profile images — S3 (tests use default credential chain; uploads are not exercised unless a test calls them)
app.profile-storage.s3.bucket=test-profile-bucket
app.profile-storage.s3.region=us-east-1
app.profile-storage.s3.key-prefix=profiles/
app.profile-storage.s3.public-url-prefix=https://cdn.example.com

# Fixed test credentials so OAuth2 client auto-config always creates ClientRegistrationRepository
spring.security.oauth2.client.registration.google.client-id=test-oauth-client-id
spring.security.oauth2.client.registration.google.client-secret=test-oauth-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
