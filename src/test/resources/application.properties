# =============================================================================
# Smart Campus API — Test configuration
# =============================================================================
# Tests use in-memory H2 database and disable external services (Redis, S3, Mail)
# so they can run anywhere without infrastructure dependencies.
# =============================================================================

spring.application.name=smart-campus-system

# Use the dev profile so H2 is used instead of MySQL
spring.profiles.active=dev

# -----------------------------------------------------------------------------
# DataSource (H2 in-memory — overrides dev profile for test clarity)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:smartcampus_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -----------------------------------------------------------------------------
# JPA / Hibernate & SQL Initialization
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# -----------------------------------------------------------------------------
# Disable Redis auto-configuration for tests
# -----------------------------------------------------------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# -----------------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------------
app.jwt.secret=dev-only-change-me-use-long-random-secret-at-least-32-chars!!
app.jwt.expiration-ms=86400000

# -----------------------------------------------------------------------------
# OAuth2 (Google) — browser redirect after successful login (?token=...)
# -----------------------------------------------------------------------------
app.oauth2.frontend-redirect-url=http://localhost:5173/auth/callback

# -----------------------------------------------------------------------------
# Profile images — Amazon S3 (disabled / stub values for tests)
# -----------------------------------------------------------------------------
app.aws.access-key-id=
app.aws.secret-access-key=
app.profile-storage.s3.bucket=
app.profile-storage.s3.region=ap-south-1
app.profile-storage.s3.key-prefix=Profile-images/
app.profile-storage.s3.public-url-prefix=https://test-bucket.s3.ap-south-1.amazonaws.com/
app.profile-storage.s3.presign-duration-minutes=60

# -----------------------------------------------------------------------------
# HTTP multipart (profile uploads)
# -----------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# -----------------------------------------------------------------------------
# Mail Configuration (SMTP) — test values, not actually sending
# -----------------------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# -----------------------------------------------------------------------------
# OAuth2 client registration (Google) — test placeholders
# -----------------------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# -----------------------------------------------------------------------------
# Sample users — enable for tests so seeded data is available
# -----------------------------------------------------------------------------
app.seed.sample-users=true
