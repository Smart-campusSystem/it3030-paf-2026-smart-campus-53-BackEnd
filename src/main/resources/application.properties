spring.application.name=demo

spring.datasource.url=jdbc:h2:mem:ticketing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true

app.upload.dir=uploads/tickets
app.jwt.secret=change-this-dev-secret-key-at-least-256-bits-long-for-hs256________________
app.jwt.expiration-ms=86400000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

# Optional: configure to send real email; otherwise outbound mail is skipped when host is blank
spring.mail.host=
spring.mail.port=587
