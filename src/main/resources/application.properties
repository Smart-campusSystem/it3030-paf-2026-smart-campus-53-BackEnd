spring.application.name=demo

# Database (H2 in-memory for local dev; switch URL for MySQL)
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT (HS256 needs >= 256 bits — change in production)
app.jwt.secret=dev-only-change-me-use-long-random-secret-at-least-32-chars!!
app.jwt.expiration-ms=86400000

# After Google login, browser is redirected here with ?token=<jwt>
app.oauth2.frontend-redirect-url=http://localhost:5173/auth/callback

# Public URL of this API (used for locally stored profile image URLs)
app.public-base-url=http://localhost:8080

# Profile images: "local" (disk + /uploads/profile/...) or "s3"
app.profile-storage.mode=local
app.profile-storage.local-dir=data/profile-uploads

# When app.profile-storage.mode=s3 — also set bucket; keys optional if using IAM role
# app.profile-storage.s3.bucket=your-bucket
# app.profile-storage.s3.region=us-east-1
# app.profile-storage.s3.key-prefix=profiles/
# app.profile-storage.s3.public-url-prefix=https://your-cdn.example.com
# app.profile-storage.s3.access-key=
# app.profile-storage.s3.secret-key=

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# Google OAuth — set env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (placeholders allow app to start without Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-with-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-with-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
