# =============================================================================
# Smart Campus API — Spring Boot configuration
# =============================================================================
# Production: set all secrets and cloud values via environment variables
# or a secrets manager; do not commit credentials.
# =============================================================================

spring.application.name=smart-campus-system

# -----------------------------------------------------------------------------
# DataSource (MySQL)
# -----------------------------------------------------------------------------
# Env: MYSQL_HOST, MYSQL_PORT, MYSQL_DB, MYSQL_USER, MYSQL_PASSWORD
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:smartcampus}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
# Must match your MySQL user password (set MYSQL_PASSWORD if it is not the default below).
spring.datasource.password=${MYSQL_PASSWORD:1234}

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
# Fail startup if JDBC metadata cannot be read (avoids confusing follow-up errors after a bad DB login).
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=require

# Optional: H2 for local experiments only — comment MySQL block above first
# spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true

# -----------------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------------
# HS256: use a randomly generated secret >= 256 bits in production (env: APP_JWT_SECRET)
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-use-long-random-secret-at-least-32-chars!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# -----------------------------------------------------------------------------
# OAuth2 (Google) — browser redirect after successful login (?token=...)
# -----------------------------------------------------------------------------
app.oauth2.frontend-redirect-url=${APP_OAUTH2_FRONTEND_REDIRECT_URL:http://localhost:5173/auth/callback}

# -----------------------------------------------------------------------------
# Profile images — Amazon S3 only
# -----------------------------------------------------------------------------
# Credentials: use IAM roles (ECS, EKS, EC2), or environment / shared credentials:
# or provide them explicitly below via environment variables.
app.aws.access-key-id=${AWS_ACCESS_KEY_ID:}
app.aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
# Never store raw access keys directly in this file.
#
# Bucket must allow PutObject from this application; public-facing URLs usually use
# a stable HTTPS prefix (S3 public website, CloudFront, or virtual-hosted bucket URL).
#
# Env: AWS_REGION (standard SDK) overlaps with bucket region — we use S3-specific below.
app.profile-storage.s3.bucket=${AWS_S3_PROFILE_BUCKET:}
app.profile-storage.s3.region=${AWS_S3_PROFILE_REGION:${AWS_REGION:ap-south-1}}
app.profile-storage.s3.key-prefix=${AWS_S3_PROFILE_KEY_PREFIX:Profile-images/}
# Base URL for stored objects (no trailing slash required; app normalizes). Example:
# https://<bucket>.s3.<region>.amazonaws.com  or  https://<cloudfront-distribution>
app.profile-storage.s3.public-url-prefix=${AWS_S3_PROFILE_PUBLIC_BASE_URL:https://smart-campus-images-b2.s3.ap-south-1.amazonaws.com/}
# Presigned GET URLs returned in JSON (required for private buckets; refresh via /api/users/me)
app.profile-storage.s3.presign-duration-minutes=${AWS_S3_PROFILE_PRESIGN_DURATION_MINUTES:60}

# -----------------------------------------------------------------------------
# HTTP multipart (profile uploads)
# -----------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# -----------------------------------------------------------------------------
# Mail Configuration (SMTP)
# -----------------------------------------------------------------------------
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# -----------------------------------------------------------------------------
# OAuth2 client registration (Google)
# -----------------------------------------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-with-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-with-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# -----------------------------------------------------------------------------
# Sample users (one per role: ADMIN, USER, TECHNICIAN)
# -----------------------------------------------------------------------------
# Set true to insert LOCAL accounts on startup if missing (same password for all):
#   SamplePass12
# Emails: sample-admin@example.com, sample-user@example.com, sample-technician@example.com
app.seed.sample-users=${APP_SEED_SAMPLE_USERS:true}