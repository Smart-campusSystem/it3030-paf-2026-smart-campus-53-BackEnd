# =============================================================================
# Profile "prod": Production configuration for AWS deployment
# =============================================================================
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST come from environment variables — never hardcode here.
# =============================================================================

# --- DataSource (RDS MySQL) ---
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:smartcampus}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# --- JPA / Hibernate ---
# Use 'validate' in production to prevent accidental schema changes.
# Run migrations with Flyway or Liquibase for controlled schema evolution.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Redis ---
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# --- Logging ---
logging.level.root=WARN
logging.level.com.smart_campus_system=INFO
logging.level.org.springframework.security=WARN
logging.file.name=/app/logs/smart-campus.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# --- Disable sample user seeding in production ---
app.seed.sample-users=false

# --- Server ---
server.error.include-stacktrace=never
server.error.include-message=never
