# Profile "mysql": shared JPA datasource (users, tickets, …). Activate with SPRING_PROFILES_ACTIVE=mysql (default profile is dev/H2).
#
# --- See your data in MySQL Workbench ---
# 1) Start the MySQL service (Windows: Services, or mysqld).
# 2) Start the API: .\mvnw.cmd spring-boot:run
# 3) Workbench: Database -> Connect -> Hostname localhost, Port 3306, Username = MYSQL_USER (default root),
#    Password = same as MYSQL_PASSWORD below. Test Connection -> OK.
# 4) In Navigator, refresh Schemas and open database "smartcampus" (same as MYSQL_DB). Tables appear after the
#    app starts once (Hibernate ddl-auto=update creates them). Rows appear when you use the app or seed users.
# 5) Optional: File -> Open SQL Script -> scripts/workbench-view-data.sql -> Execute (lightning bolt).
#
# Env overrides: MYSQL_HOST, MYSQL_PORT, MYSQL_DB, MYSQL_USER, MYSQL_PASSWORD.
# 1045 Access denied: MYSQL_PASSWORD in your shell overrides the default here — it must match Workbench exactly
# (passwords are case-sensitive, e.g. ...@Hk vs ...@HK). If unsure, omit MYSQL_PASSWORD and rely on the default below.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:smartcampus}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:200371@Hk}
