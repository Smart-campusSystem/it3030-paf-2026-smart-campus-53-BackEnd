# In-memory H2 — default for local runs (spring.profiles.default=dev in application.properties).
# Override: use profile mysql for MySQL (application-mysql.properties).
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
