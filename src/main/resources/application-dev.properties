# Profile "dev": embedded H2 (no MySQL). Use when MYSQL_PASSWORD is unset/wrong or MySQL is not running.
# For MySQL: SPRING_PROFILES_ACTIVE=mysql (see application-mysql.properties).
# MODE=MySQL keeps data.sql INSERT IGNORE compatible with MySQL.
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
