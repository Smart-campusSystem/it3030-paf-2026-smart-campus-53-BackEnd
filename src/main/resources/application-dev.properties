# In-memory H2 — activate with SPRING_PROFILES_ACTIVE=dev (no MySQL required). Data is lost when the JVM exits.
# Default application profile is mysql; see application-mysql.properties for Workbench-visible persistence.
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
