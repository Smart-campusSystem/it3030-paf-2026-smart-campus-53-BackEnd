# In-memory H2 — default local profile (spring.profiles.default=dev). Data is not persisted across restarts.
# For MySQL (persisted tickets/users): SPRING_PROFILES_ACTIVE=mysql — see application-mysql.properties.
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
